<!-- Sections (unterhalb von container) -->
<div class="container">

  <!-- Home -->
  <div class="section" id="home">
    <div class="section-title">Freunde</div>
    <div class="card">
      <div class="friend-add" id="friendAdd">➕ Freunde hinzufügen / Einladungslink kopieren</div>
      <div id="friends"></div>
    </div>
  </div>

  <!-- Timer -->
  <div class="section" id="timerSection" style="display:none;">
    <div class="section-title">Timer</div>
    <div class="card timer">
      <div class="time" id="timerDisplay">00:00</div>
      <div class="timer-buttons">
        <button class="btn" onclick="startTimer()">Start</button>
        <button class="btn btn-secondary" onclick="stopTimer()">Stop</button>
      </div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="section" id="tasks" style="display:none;">
    <div class="section-title">Tasks</div>
    <div class="card" id="taskList"></div>
  </div>

  <!-- Rooms -->
  <div class="section" id="rooms" style="display:none;">
    <div class="section-title">Räume</div>
    <div class="rooms">
      <div class="room">Room 1</div>
      <div class="room">Room 2</div>
    </div>
  </div>

  <!-- Map -->
  <div class="section" id="mapSection" style="display:none;">
    <div class="section-title">Map</div>
    <div id="map"></div>
  </div>

  <!-- Profile -->
  <div class="section" id="profile" style="display:none;">
    <div class="section-title">Profil</div>
    <div class="card profile">
      <input placeholder="Name">
      <input type="email" placeholder="Email">
    </div>
  </div>

</div>

<script>
// Page switching
function showPage(page, element) {
  document.querySelectorAll(".section").forEach(s => s.style.display = "none");
  document.getElementById(page).style.display = "block";

  document.querySelectorAll(".nav-item").forEach(nav => nav.classList.remove("active"));
  element.classList.add("active");
}

// Map init
let mapInitialized = false;
function initMap() {
  if(mapInitialized) return;
  mapInitialized = true;

  const map = L.map('map').setView([51.505, -0.09], 2);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(map);
}

// Timer stub
let timerInterval;
function startTimer() { clearInterval(timerInterval); /* Add your logic */ }
function stopTimer() { clearInterval(timerInterval); }

// Overlay & Modal
const overlay = document.getElementById("overlay");
const modal = document.getElementById("loginModal");
const closeModal = () => {
  modal.style.display = "none";
  overlay.style.display = "none";
};
document.querySelector("#loginModal .closeModal").addEventListener("click", closeModal);
overlay.addEventListener("click", closeModal);

// Show modal at start
window.addEventListener("load", () => {
  modal.style.display = "flex";
  overlay.style.display = "block";
});
</script>
