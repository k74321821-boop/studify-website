<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studify</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
  --bg: #0a0a0a;
  --card: #1a1a1a;
  --hover: #252525;
  --text: #ffffff;
  --sub: #a0a0a0;
  --yellow: #ffd700;
  --border: #333;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif; }

body {
  background: var(--bg);
  color: var(--text);
  padding-bottom: 90px;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.logo {
  font-weight: 800;
  font-size: 22px;
  display: flex;
  gap: 8px;
  align-items: center;
}

.logo-icon {
  background: var(--yellow);
  color: black;
  width: 34px;
  height: 34px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Container */
.container {
  max-width: 720px;
  margin: auto;
  padding: 20px;
}

/* Sections */
.section {
  margin-bottom: 30px;
}

.section-title {
  font-weight: 700;
  margin-bottom: 10px;
}

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
}

/* Clickable yellow outlines */
button, .friend-add, .room, .checkbox, .profile input, select {
  border: 2px solid transparent;
  transition: 0.2s;
}

button:hover, .friend-add:hover, .room:hover, .checkbox:hover, .profile input:focus, select:focus {
  border-color: var(--yellow);
  outline: none;
}

/* Friend section */
.friend-add {
  padding: 16px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  text-align: center;
  color: var(--sub);
  cursor: pointer;
}

/* Other elements */
.friend, .task, .leaderboard-item, .stat, .room {
  background: var(--hover);
  border-radius: 10px;
  margin-top: 8px;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

.checkbox {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
}

/* Timer */
.timer { text-align: center; }
.time { font-size: 56px; color: var(--yellow); font-weight: 800; margin: 10px 0; }
.timer-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
.btn { background: var(--yellow); border: none; padding: 12px 18px; border-radius: 10px; font-weight: 600; cursor: pointer; }
.btn-secondary { background: var(--hover); color: white; }

/* Rooms grid */
.rooms { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.room { cursor: pointer; text-align: center; }

/* Navigation */
.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  display: flex;
  border-top: 1px solid var(--border);
}

.nav-item {
  flex: 1;
  text-align: center;
  padding: 10px;
  color: var(--sub);
  cursor: pointer;
}

.nav-item.active { color: var(--yellow); }

/* Map */
#map { position: fixed; top: 60px; left: 0; width: 100%; height: calc(100vh - 60px); }

/* Profile */
.profile input { width: 100%; margin-top: 6px; margin-bottom: 10px; padding: 10px; border-radius: 8px; background: var(--hover); color: white; }

/* Streak */
.streak { font-size: 20px; font-weight: 700; color: var(--yellow); margin-top: 6px; }

/* Stats */
.stats { display: flex; gap: 20px; margin-top: 10px; }

/* Modal Login/Register */
#loginModal {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--card);
  padding: 30px;
  border-radius: 16px;
  border: 2px solid var(--yellow);
  z-index: 1000;
  display: none;
  flex-direction: column;
  gap: 10px;
}

#loginModal .closeModal {
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 20px;
  cursor: pointer;
  color: var(--sub);
}

#loginModal .closeModal:hover {
  color: var(--yellow);
}

/* Overlay */
#overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 900;
  display: none;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="logo-icon">📚</div>Studify</div>
  <div id="profileName">DU</div>
</div>

<div class="container">

  <!-- Freunde -->
  <div class="section" id="home">
    <div class="section-title">Freunde</div>
    <div class="card">
      <div class="friend-add" id="friendAdd">➕ Freunde hinzufügen / Einladungslink kopieren</div>
      <div id="friends"></div>
    </div>

    <div class="section-title" style="margin-top:20px">Study Streak</div>
    <div class="card">
      <div>Deine Lernserie</div>
      <div class="streak" id="streak">🔥 0 Tage</div>
      <div class="stats">
        <div class="stat">Tasks<br><span id="statTasks">0</span></div>
        <div class="stat">Sessions<br><span id="statSessions">0</span></div>
      </div>
    </div>

    <div class="section-title" style="margin-top:20px">Leaderboard</div>
    <div class="card" id="leaderboard"></div>
  </div>

</div>

<!-- Navigation -->
<div class="nav">
  <div class="nav-item active" data-page="home">🏠</div>
  <div class="nav-item" data-page="timerSection">⏱</div>
  <div class="nav-item" data-page="tasks">✅</div>
  <div class="nav-item" data-page="rooms">👥</div>
  <div class="nav-item" data-page="mapSection">🌍</div>
  <div class="nav-item" data-page="profile">👤</div>
</div>

<!-- Login/Register Modal -->
<div id="overlay"></div>
<div id="loginModal">
  <span class="closeModal">×</span>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Passwort">
  <div style="display:flex;gap:10px;">
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Registrieren</button>
  </div>
</div>

<script type="module" src="app.js"></script>
<script>
const overlay = document.getElementById("overlay");
const modal = document.getElementById("loginModal");

// Modal öffnen beim Laden
window.addEventListener("load", () => {
  modal.style.display = "flex";
  overlay.style.display = "block";
});

// Modal schließen
const closeModal = () => {
  modal.style.display = "none";
  overlay.style.display = "none";
};

// EventListener für Close
document.querySelector("#loginModal .closeModal").addEventListener("click", closeModal);
overlay.addEventListener("click", closeModal);

// Buttons Login/Register
document.getElementById("loginBtn").addEventListener("click", () => {
  login();        // Funktion aus app.js
  closeModal();
});

document.getElementById("registerBtn").addEventListener("click", () => {
  register();     // Funktion aus app.js
  closeModal();
});

// Friend Add
document.getElementById("friendAdd").addEventListener("click", () => {
  inviteFriends();
});

// Navigation
document.querySelectorAll(".nav-item").forEach(item => {
  item.addEventListener("click", () => {
    const page = item.getAttribute("data-page");
    showPage(page, item);
    if(page === 'mapSection') initMap();
  });
});
</script>

</body>
</html>
